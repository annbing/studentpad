        /* Cozy House Outline Cursor */
        .cozy-house-cursor {
            width: 16px;
            height: 16px;
            position: fixed;
            pointer-events: none;
            z-index: 10000;
            transform: translate(-50%, -50%);
            transition: transform 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275), color 0.2s, filter 0.2s;

            align-items: center;
            justify-content: center;

            transform: translate(-50%, -50%) scale(0.8);

        .cozy-house-cursor.hovering-link {
            transform: translate(-50%, -50%) scale(1.3);

        }
        ::-webkit-scrollbar-thumb:hover {

</head>

                                return 0;
                            }
                            return prev + 1.25; // timing speed
                        });
                    }, 50);

            useEffect(() => {

                        cozyHouse.style.left = `${e.clientX}px`;
                        cozyHouse.style.top = `${e.clientY}px`;
                    }
                };

                const handleMouseDown = () => {
                    if (cozyHouse) cozyHouse.classList.add('clicking');
                };

                const handleMouseUp = () => {
                    if (cozyHouse) cozyHouse.classList.remove('clicking');
                };

                const handleMouseOverLink = (e) => {
                    const tag = e.target.tagName;
                    const isHoverable = tag === 'BUTTON' || tag === 'A' || tag === 'SELECT' || tag === 'INPUT' || tag === 'TEXTAREA' || e.target.closest('[role="button"]') || e.target.closest('.interactive-card');
                    if (isHoverable && cozyHouse) {
                        cozyHouse.classList.add('hovering-link');
                    }
                };

                const handleMouseOutLink = (e) => {
                    if (cozyHouse) {
                        cozyHouse.classList.remove('hovering-link');
                    }
                };

                window.addEventListener('mousemove', handleMouseMove);
                window.addEventListener('mousedown', handleMouseDown);
                window.addEventListener('mouseup', handleMouseUp);
                window.addEventListener('mouseover', handleMouseOverLink);
                window.addEventListener('mouseout', handleMouseOutLink);

                return () => {
                    window.removeEventListener('mousemove', handleMouseMove);
                    window.removeEventListener('mousedown', handleMouseDown);
                    window.removeEventListener('mouseup', handleMouseUp);
                    window.removeEventListener('mouseover', handleMouseOverLink);
                    window.removeEventListener('mouseout', handleMouseOutLink);

            // Handle simulation of university email verification
            const handleVerificationSubmit = (e) => {
                e.preventDefault();
                if (emailInput.toLowerCase().endsWith('.edu')) {
                    setVerifying(true);
                    setVerifyProgress(0);

                    // Incremental progress bar
                    const interval = setInterval(() => {
                        setVerifyProgress(prev => {
                            if (prev >= 100) {
                                clearInterval(interval);
                                setVerifying(false);
                                setVerifiedUser(true);
                                setShowVerifyModal(false);
                                triggerToast("Academic network linked!", "success");
                                return 100;

            // Messaging thread simulator

                                        );
                                    })()}
                                </main>

                            </div>
                        )}

                        {/* --- POST SUBLET FORM VIEW --- */}
                        {view === 'post' && (

                                                    onChange={(e) => setNewListing({...newListing, rent: e.target.value})}

                                                    <option>Spring 2027</option>

                                            </div>

                                            <div className="space-y-1.5">

                                                    className="w-full bg-cozy-bg border border-cozy-border rounded-xl px-4 py-2.5 text-cozy-textDark focus:outline-none focus:ring-1 focus:ring-cozy-accent"

                                            <p className="text-cozy-textMuted leading-relaxed text-xs">{selectedListing.description}</p>
                                        </div>

                                        {/* Verified profile banner card - Twitter Blue Rosette Checkmark */}

                                                Linked Node

                                        </div>

                                    </div>

                                    {/* Buttons controls bar */}
                                    <div className="p-4 border-t border-cozy-border bg-cozy-bg flex space-x-3 shrink-0">
                                        <button

                                    <CardCornerDecor />

                                    <div className="text-center space-y-2 relative z-10">
                                        <div className="w-12 h-12 rounded-full bg-cozy-accentLight border border-cozy-accent/20 flex items-center justify-center mx-auto text-cozy-accent text-lg shadow-xs">
                                            🎓

                                        <h3 className="font-extrabold text-sm text-cozy-primary uppercase tracking-wider">Link Your University Address</h3>
                                        <p className="text-cozy-textMuted text-xs leading-relaxed max-w-xs mx-auto">

                                        </p>
                                    </div>

                                    {/* Verification process bar */}
                                    {verifying ? (
                                        <div className="space-y-3">
                                            <div className="flex justify-between text-[10px] uppercase font-bold text-cozy-sage">
                                                <span>Verifying academic server node...</span>
                                                <span>{verifyProgress}%</span>

                                            <div className="w-full bg-cozy-bg h-2 border border-cozy-border rounded-full overflow-hidden">

                                            <div className="text-center text-[10px] text-cozy-textMuted italic animate-pulse">

                                            <div className="flex space-x-3 pt-2">
